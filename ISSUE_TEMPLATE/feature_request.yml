name: Feature request
description: Propose a focused improvement with a clear ownership boundary.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Repository boundary
      description: Why does this belong in this repository instead of another one?
    validations:
      required: true
