name: Reusable CodeQL

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the source to analyze.
        required: false
        type: string
        default: .
      language:
        description: CodeQL language identifier.
        required: false
        type: string
        default: go
      go-version-file:
        description: Path to go.mod when the analyzed language is Go.
        required: false
        type: string
        default: go.mod
      build-mode:
        description: Whether to use CodeQL autobuild or a manual build command.
        required: false
        type: string
        default: autobuild
      build-command:
        description: Manual build command used when build-mode is manual.
        required: false
        type: string
        default: ""
      requires-private-modules:
        description: Whether the repository needs private module access during analysis.
        required: false
        type: boolean
        default: false
    secrets:
      modules-token:
        required: false

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: false

      - name: Configure private module access
        if: ${{ inputs.requires-private-modules }}
        env:
          SEPTAGON_MODULES_TOKEN: ${{ secrets.modules-token }}
        run: |
          set -euo pipefail
          if [[ -z "${SEPTAGON_MODULES_TOKEN:-}" ]]; then
            echo "modules-token secret is required when requires-private-modules=true" >&2
            exit 1
          fi
          git config --global url."https://x-access-token:${SEPTAGON_MODULES_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}

      - name: Autobuild
        if: ${{ inputs.build-mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@v3

      - name: Manual build
        if: ${{ inputs.build-mode == 'manual' }}
        run: |
          set -euo pipefail
          if [[ -z "${{ inputs.build-command }}" ]]; then
            echo "build-command is required when build-mode=manual" >&2
            exit 1
          fi
          ${{ inputs.build-command }}

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ inputs.language }}"
