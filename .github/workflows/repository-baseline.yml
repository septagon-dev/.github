name: Repository Baseline

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  baseline:
    uses: septagon-dev/.github/.github/workflows/reusable-repository-baseline.yml@main
    with:
      required_paths: |
        README.md
        profile/README.md
        .github/CODEOWNERS
        .github/dependabot.yml
        PULL_REQUEST_TEMPLATE.md
        SECURITY.md
        CONTRIBUTING.md
        SUPPORT.md
        docs/REPOSITORY_STANDARDS.md
