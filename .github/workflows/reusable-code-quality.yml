name: Reusable Code Quality

on:
  workflow_call:
    inputs:
      build-command:
        description: Optional multiline shell command used to build analyzed Go code.
        required: false
        type: string
        default: ""
      go-version-file:
        description: Path to the go.mod file used to resolve the Go toolchain version.
        required: false
        type: string
        default: go.mod

permissions:
  actions: read
  contents: read
  security-events: write

env:
  GIT_TERMINAL_PROMPT: 0
  GONOPROXY: github.com/septagon-dev/*
  GONOSUMDB: github.com/septagon-dev/*
  GOPRIVATE: github.com/septagon-dev/*
  GOWORK: off

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect scannable content
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          has_files() {
            git ls-files -- "$@" | grep -q .
          }

          languages=()
          has_go=false
          has_workflows=false

          if has_files '*.go'; then
            languages+=("go")
            has_go=true
          fi

          if has_files '.github/workflows/*.yml' '.github/workflows/*.yaml'; then
            languages+=("actions")
            has_workflows=true
          fi

          if has_files '*.js' '*.jsx' '*.ts' '*.tsx'; then
            languages+=("javascript-typescript")
          fi

          if has_files '*.py'; then
            languages+=("python")
          fi

          if has_files '*.java' '*.kt' '*.kts'; then
            languages+=("java-kotlin")
          fi

          if has_files '*.rb'; then
            languages+=("ruby")
          fi

          if has_files '*.swift'; then
            languages+=("swift")
          fi

          if has_files '*.cs'; then
            languages+=("csharp")
          fi

          if has_files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx'; then
            languages+=("c-cpp")
          fi

          if has_files '*.rs'; then
            languages+=("rust")
          fi

          if ((${#languages[@]} > 0)); then
            joined="$(IFS=,; echo "${languages[*]}")"
            echo "build_mode=$([[ "$has_go" == "true" ]] && echo manual || echo none)" >> "$GITHUB_OUTPUT"
            echo "has_codeql=true" >> "$GITHUB_OUTPUT"
            echo "languages=$joined" >> "$GITHUB_OUTPUT"
          else
            echo "build_mode=none" >> "$GITHUB_OUTPUT"
            echo "has_codeql=false" >> "$GITHUB_OUTPUT"
            echo "languages=" >> "$GITHUB_OUTPUT"
          fi

          echo "has_go=$has_go" >> "$GITHUB_OUTPUT"
          echo "has_workflows=$has_workflows" >> "$GITHUB_OUTPUT"

      - name: Set up Go for workflow linting
        if: steps.detect.outputs.has_workflows == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.6"
          cache: false

      - name: Lint GitHub workflows
        if: steps.detect.outputs.has_workflows == 'true'
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
          "$(go env GOPATH)/bin/actionlint"

      - name: Set up Go for CodeQL
        if: steps.detect.outputs.has_go == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: false

      - name: Configure private module access
        if: steps.detect.outputs.has_go == 'true'
        shell: bash
        env:
          SEPTAGON_MODULES_TOKEN: ${{ secrets.SEPTAGON_MODULES_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${SEPTAGON_MODULES_TOKEN}" ]]; then
            echo "SEPTAGON_MODULES_TOKEN is not configured; continuing without private module rewrite."
            exit 0
          fi
          git config --global url."https://x-access-token:${SEPTAGON_MODULES_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Initialize CodeQL
        if: steps.detect.outputs.has_codeql == 'true'
        uses: github/codeql-action/init@v4
        with:
          build-mode: ${{ steps.detect.outputs.build_mode }}
          languages: ${{ steps.detect.outputs.languages }}
          queries: security-and-quality

      - name: Build Go code for CodeQL
        if: steps.detect.outputs.has_go == 'true'
        shell: bash
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: |
          set -euo pipefail
          if [[ -n "${BUILD_COMMAND}" ]]; then
            printf '%s\n' "${BUILD_COMMAND}" | bash -euo pipefail
          else
            go build ./...
          fi

      - name: Analyze with CodeQL
        if: steps.detect.outputs.has_codeql == 'true'
        uses: github/codeql-action/analyze@v4

      - name: No CodeQL-supported content detected
        if: steps.detect.outputs.has_codeql != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "No CodeQL-supported source files or workflows were detected."
